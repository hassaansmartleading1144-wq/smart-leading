name: FTP secrets check (temporary)

# Temporary diagnostic only. Does NOT print secret values.
# Prints length / format metadata so we can verify Actions receives updated secrets.

on:
  workflow_dispatch:
  push:
    branches:
      - fix/ftp-slsteampush-account
    paths:
      - .github/workflows/ftp-secrets-check.yml

jobs:
  check-secrets:
    name: Verify FTP secret metadata
    runs-on: ubuntu-latest
    steps:
      - name: Print safe FTP secret metadata
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          set -euo pipefail

          if [ -z "${FTP_SERVER}" ]; then
            echo "FTP_SERVER: MISSING"
          else
            echo "FTP_SERVER length: ${#FTP_SERVER}"
          fi

          if [ -z "${FTP_USERNAME}" ]; then
            echo "FTP_USERNAME: MISSING"
            echo "FTP_USERNAME length: 0"
            echo "FTP_USERNAME contains @: no"
          else
            echo "FTP_USERNAME length: ${#FTP_USERNAME}"
            if [[ "${FTP_USERNAME}" == *"@"* ]]; then
              echo "FTP_USERNAME contains @: yes"
            else
              echo "FTP_USERNAME contains @: no"
            fi
          fi

          if [ -z "${FTP_PASSWORD}" ]; then
            echo "FTP_PASSWORD: MISSING"
            echo "FTP_PASSWORD length: 0"
          else
            echo "FTP_PASSWORD length: ${#FTP_PASSWORD}"
          fi

          echo "Done. No secret values were printed."
