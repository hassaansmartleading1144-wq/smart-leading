name: Preview Pages

on:
  push:
    branches:
      - main
      - cursor/digital-marketing-page-b07d
    paths:
      - 'preview/**'
      - 'wp-content/themes/smart-leading-net/assets/css/digital-marketing-page.css'
      - 'wp-content/themes/smart-leading-net/assets/css/variables.css'
      - 'wp-content/themes/smart-leading-net/assets/js/digital-marketing-page.js'
      - '.github/workflows/preview-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: preview-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare preview site
        run: |
          mkdir -p _site/preview
          mkdir -p _site/wp-content/themes/smart-leading-net/assets/css
          mkdir -p _site/wp-content/themes/smart-leading-net/assets/js
          cp preview/digital-marketing-preview.html _site/preview/index.html
          cp preview/digital-marketing-preview.html _site/preview/digital-marketing-preview.html
          cp wp-content/themes/smart-leading-net/assets/css/variables.css _site/wp-content/themes/smart-leading-net/assets/css/
          cp wp-content/themes/smart-leading-net/assets/css/digital-marketing-page.css _site/wp-content/themes/smart-leading-net/assets/css/
          cp wp-content/themes/smart-leading-net/assets/js/digital-marketing-page.js _site/wp-content/themes/smart-leading-net/assets/js/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
