name: Deploy wp-content to cPanel (FTP)

# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER   = ftp.hashdata.co
#   FTP_USERNAME = webhassaankhan@smartleading.net
#   FTP_PASSWORD = (your cPanel FTP password — never commit this)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: FTP deploy to InterServer
    runs-on: ubuntu-latest

    steps:
      - name: Validate FTP secrets
        run: |
          missing=""
          if [ -z "${{ secrets.FTP_SERVER }}" ]; then
            missing="${missing} FTP_SERVER"
          fi
          if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
            missing="${missing} FTP_USERNAME"
          fi
          if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
            missing="${missing} FTP_PASSWORD"
          fi
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub Secrets:$missing"
            echo "Add them at: Repository → Settings → Secrets and variables → Actions"
            echo "Expected values:"
            echo "  FTP_SERVER   = ftp.hashdata.co"
            echo "  FTP_USERNAME = webhassaankhan@smartleading.net"
            echo "  FTP_PASSWORD = your cPanel FTP password"
            exit 1
          fi
          echo "All required FTP secrets are configured."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy themes, plugins, and uploads
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          server-dir: public_html/wp-content/
          local-dir: wp-content/
          log-level: standard
          dry-run: false
          exclude: |
            **/.git/**
            **/.git*
            **/.github/**
            **/README*
            **/readme*
            **/cache/**
            **/Cache/**
            **/*.log
            **/debug.log
            **/error_log
            **/*.tmp
            **/*.temp
            **/*.cache
            **/.DS_Store
            **/Thumbs.db
            **/desktop.ini
