name: Deploy wp-content to cPanel (FTP)

# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER   = 173.225.110.102
#   FTP_USERNAME = slsteampush
#   FTP_PASSWORD = (new FTP password — never commit this)
#
# FTP account root: /home/hashdata/smartleading.net
# Live deploy target: /home/hashdata/smartleading.net/wp-content/
# Do NOT deploy to webhassaankhan/public_html/

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: FTP deploy to InterServer
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Validate FTP secrets
        run: |
          missing=""
          if [ -z "${{ secrets.FTP_SERVER }}" ]; then
            missing="${missing} FTP_SERVER"
          fi
          if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
            missing="${missing} FTP_USERNAME"
          fi
          if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
            missing="${missing} FTP_PASSWORD"
          fi
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub Secrets:$missing"
            echo "Add them at: Repository → Settings → Secrets and variables → Actions"
            echo "Expected values:"
            echo "  FTP_SERVER   = 173.225.110.102"
            echo "  FTP_USERNAME = slsteampush"
            echo "  FTP_PASSWORD = new FTP password"
            exit 1
          fi

          # ftp.hashdata.co resolves to CloudFront (AWS), not the cPanel FTP server.
          if [ "${{ secrets.FTP_SERVER }}" = "ftp.hashdata.co" ] || [ "${{ secrets.FTP_SERVER }}" = "hashdata.co" ]; then
            echo "::error::FTP_SERVER points to CloudFront. Use 173.225.110.102 instead."
            exit 1
          fi

          echo "All required FTP secrets are configured."

      - name: Check FTP server connectivity
        run: |
          SERVER="${{ secrets.FTP_SERVER }}"
          echo "FTP server: $SERVER"
          echo "Expected server IP: 173.225.110.102"
          echo "Deploy target: /home/hashdata/smartleading.net/wp-content/"
          if timeout 15 bash -c "echo > /dev/tcp/$SERVER/21" 2>/dev/null; then
            echo "Port 21 is reachable."
          else
            echo "::warning::Could not reach port 21 within 15s — deploy may still work with FTPS."
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy themes, plugins, and uploads
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          timeout: 120000
          server-dir: wp-content/
          local-dir: wp-content/
          log-level: verbose
          dry-run: false
          exclude: |
            **/.git/**
            **/.git*
            **/.github/**
            **/README*
            **/readme*
            **/cache/**
            **/Cache/**
            **/*.log
            **/debug.log
            **/error_log
            **/*.tmp
            **/*.temp
            **/*.cache
            **/.DS_Store
            **/Thumbs.db
            **/desktop.ini
